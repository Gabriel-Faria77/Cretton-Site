<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cretton Modas - Estilo que combina com você. Moda moderna e acessível.">
    <title id="titulo">Carregando...</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="hero">
        <div class="container">
            <h1 id="nomeEmpresa"></h1>
            <p id="slogan"></p>
        </div>
    </header>

    <main>
        <section class="sobre container">
            <h2>Sobre nós</h2>
            <div class="linha-decorativa"></div>
            <p id="descricao"></p>
        </section>

        <section class="produtos container">
            <h2>Produtos em destaque</h2>
            <div class="linha-decorativa"></div>
            <div class="grid-produtos" id="produtosContainer"></div>
        </section>

        <section class="contato container">
            <h2>Contato</h2>
            <div class="linha-decorativa"></div>
            <p id="endereco"></p>

            <div class="botoes">
                <a id="instagramLink" target="_blank" class="btn btn-insta">Instagram</a>
                <a id="whatsappLink" target="_blank" class="btn btn-wpp">WhatsApp</a>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© <span id="ano"></span> - <span id="empresaFooter"></span>. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="data/empresa.js"></script>
    <script src="js/script.js"></script>

</body> 
</html>
